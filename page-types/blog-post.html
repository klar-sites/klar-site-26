<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog Post — Vector</title>
  <meta name="description" content="Vector blog post — insights on AI-native execution and modern product teams.">
  <style>
    .vblog-2026 {
      --vblog-2026-bg: #07080d;
      --vblog-2026-bg-soft: #0c0e16;
      --vblog-2026-surface: rgba(255, 255, 255, 0.045);
      --vblog-2026-line: rgba(255, 255, 255, 0.11);
      --vblog-2026-line-strong: rgba(255, 255, 255, 0.18);
      --vblog-2026-text: #f5f7fb;
      --vblog-2026-text-muted: #a8b0c3;
      --vblog-2026-text-soft: #7f879a;
      --vblog-2026-primary: #8b5cf6;
      --vblog-2026-primary-strong: #a78bfa;
      --vblog-2026-primary-soft: rgba(139, 92, 246, 0.18);
      --vblog-2026-cyan: #22d3ee;
      --vblog-2026-font: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --vblog-2026-gradient-primary: linear-gradient(135deg, #a78bfa, #8b5cf6 58%, #6d5dfc);
      --vblog-2026-gradient-border: linear-gradient(135deg, rgba(167, 139, 250, 0.52), rgba(34, 211, 238, 0.22), rgba(255, 255, 255, 0.08));
      --vblog-2026-radius: 1.25rem;
      --vblog-2026-radius-full: 999rem;
      --vblog-2026-ease: cubic-bezier(0.2, 0.8, 0.2, 1);

      position: relative;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      font-family: var(--vblog-2026-font);
      line-height: 1.65;
      color: var(--vblog-2026-text);
      background:
        radial-gradient(circle at 20% 8%, rgba(139, 92, 246, 0.22), transparent 32%),
        radial-gradient(circle at 82% 6%, rgba(34, 211, 238, 0.15), transparent 30%),
        linear-gradient(180deg, var(--vblog-2026-bg), var(--vblog-2026-bg-soft) 45%, var(--vblog-2026-bg) 100%);
      -webkit-font-smoothing: antialiased;
    }

    .vblog-2026 *,
    .vblog-2026 *::before,
    .vblog-2026 *::after { box-sizing: border-box; }

    .vblog-2026__shell {
      width: min(calc(100% - 2rem), 48rem);
      margin-inline: auto;
      padding: 3.5rem 0 5rem;
    }

    .vblog-2026__back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
      color: var(--vblog-2026-text-muted);
      font-size: 0.875rem;
      font-weight: 700;
      text-decoration: none;
      transition: color 160ms var(--vblog-2026-ease);
    }
    .vblog-2026__back:hover { color: var(--vblog-2026-text); }
    .vblog-2026__back svg { width: 1rem; height: 1rem; }

    .vblog-2026__meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .vblog-2026__category {
      display: inline-flex;
      align-items: center;
      padding: 0.35rem 0.75rem;
      color: var(--vblog-2026-primary-strong);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--vblog-2026-primary-soft);
      border: 0.0625rem solid rgba(167, 139, 250, 0.24);
      border-radius: var(--vblog-2026-radius-full);
    }
    .vblog-2026__date,
    .vblog-2026__readtime {
      color: var(--vblog-2026-text-soft);
      font-size: 0.8rem;
      font-weight: 600;
    }
    .vblog-2026__dot {
      width: 0.25rem;
      height: 0.25rem;
      background: var(--vblog-2026-text-soft);
      border-radius: 50%;
    }

    .vblog-2026__title {
      margin: 0 0 1.25rem;
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 820;
      line-height: 1.08;
      letter-spacing: -0.05em;
    }

    .vblog-2026__lead {
      margin: 0 0 2rem;
      color: var(--vblog-2026-text-muted);
      font-size: 1.1875rem;
      line-height: 1.6;
    }

    .vblog-2026__author {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding-bottom: 2rem;
      margin-bottom: 2.5rem;
      border-bottom: 0.0625rem solid var(--vblog-2026-line);
    }
    .vblog-2026__avatar {
      display: grid;
      width: 2.75rem;
      height: 2.75rem;
      flex: 0 0 auto;
      place-items: center;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 850;
      background: linear-gradient(135deg, var(--vblog-2026-primary), var(--vblog-2026-cyan));
      border-radius: 50%;
    }
    .vblog-2026__author-name {
      color: var(--vblog-2026-text);
      font-size: 0.9rem;
      font-weight: 800;
    }
    .vblog-2026__author-role {
      color: var(--vblog-2026-text-soft);
      font-size: 0.8rem;
    }

    .vblog-2026__hero {
      position: relative;
      margin-bottom: 2.75rem;
    }
    .vblog-2026__hero::before {
      position: absolute;
      inset: -0.125rem;
      z-index: 0;
      content: "";
      background: var(--vblog-2026-gradient-border);
      border-radius: calc(var(--vblog-2026-radius) + 0.125rem);
      opacity: 0.8;
    }
    .vblog-2026__hero img {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: var(--vblog-2026-radius);
    }

    .vblog-2026__body {
      color: var(--vblog-2026-text-muted);
      font-size: 1.0625rem;
      line-height: 1.78;
    }
    .vblog-2026__body > * { margin: 0 0 1.4rem; }
    .vblog-2026__body h2 {
      margin: 2.6rem 0 1rem;
      color: var(--vblog-2026-text);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .vblog-2026__body h3 {
      margin: 2rem 0 0.75rem;
      color: var(--vblog-2026-text);
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .vblog-2026__body a {
      color: var(--vblog-2026-primary-strong);
      text-decoration: underline;
      text-underline-offset: 0.2em;
    }
    .vblog-2026__body strong { color: var(--vblog-2026-text); }
    .vblog-2026__body blockquote {
      padding: 0.5rem 0 0.5rem 1.5rem;
      border-left: 0.1875rem solid var(--vblog-2026-primary);
      color: var(--vblog-2026-text);
      font-size: 1.2rem;
      font-style: italic;
    }
    .vblog-2026__body ul,
    .vblog-2026__body ol { padding-left: 1.25rem; }
    .vblog-2026__body li { margin-bottom: 0.5rem; }
    .vblog-2026__body img {
      width: 100%;
      border-radius: var(--vblog-2026-radius);
    }

    .vblog-2026__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 3rem 0;
      padding-top: 2rem;
      border-top: 0.0625rem solid var(--vblog-2026-line);
    }
    .vblog-2026__tag {
      padding: 0.35rem 0.75rem;
      color: var(--vblog-2026-text-muted);
      font-size: 0.78rem;
      font-weight: 700;
      background: var(--vblog-2026-surface);
      border: 0.0625rem solid var(--vblog-2026-line);
      border-radius: var(--vblog-2026-radius-full);
    }

    .vblog-2026__related-head {
      margin: 0 0 1.5rem;
      color: var(--vblog-2026-text);
      font-size: 1.5rem;
      font-weight: 820;
      letter-spacing: -0.03em;
    }
    .vblog-2026__related-grid {
      display: grid;
      gap: 1rem;
    }
    @media (min-width: 36rem) {
      .vblog-2026__related-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    .vblog-2026__card {
      display: block;
      overflow: hidden;
      text-decoration: none;
      background: var(--vblog-2026-surface);
      border: 0.0625rem solid var(--vblog-2026-line);
      border-radius: var(--vblog-2026-radius);
      transition: transform 260ms var(--vblog-2026-ease), border-color 260ms var(--vblog-2026-ease);
    }
    .vblog-2026__card:hover {
      transform: translateY(-0.25rem);
      border-color: var(--vblog-2026-line-strong);
    }
    .vblog-2026__card img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }
    .vblog-2026__card-body { padding: 1.25rem; }
    .vblog-2026__card-cat {
      color: var(--vblog-2026-primary-strong);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .vblog-2026__card-title {
      margin: 0.5rem 0 0;
      color: var(--vblog-2026-text);
      font-size: 1.05rem;
      font-weight: 800;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .vblog-2026__empty {
      color: var(--vblog-2026-text-soft);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <article class="vblog-2026">
    <div class="vblog-2026__shell">

      <a class="vblog-2026__back" href="/blog">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M12.5 4.5L7 10l5.5 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        Back to blog
      </a>

      <!-- The body renders from the CURRENT page's own content -->
      <div id="vblog-2026-post">
        <header>
          <div class="vblog-2026__meta">
            
            <span class="vblog-2026__date"></span>
            
          </div>

          <h1 class="vblog-2026__title">Det här är den bästa bloggen jag har sett</h1>

          <p class="vblog-2026__lead">Det kommer att bli riktigt bra det här</p>

          <div class="vblog-2026__author">
            <span class="vblog-2026__avatar"></span>
            <div>
              <div class="vblog-2026__author-name">fasdfas</div>
              <div class="vblog-2026__author-role">sadf</div>
            </div>
          </div>
        </header>

        

        <div class="vblog-2026__body">
          &lt;p&gt;Start writing your article…sdfasdf&lt;/p&gt;&lt;p class=""&gt;fsadfasdf&lt;/p&gt;&lt;p class=""&gt;asdf&lt;/p&gt;&lt;p class="klar-empty"&gt;&lt;/p&gt;
        </div>

        
        <div class="vblog-2026__tags">
          <span class="vblog-2026__tag">#Test</span>
        </div>
        
      </div>
      <template data-for="vblog-2026-post" data-query="currentPage()">
        <header>
          <div class="vblog-2026__meta">
            {% if page.content.category %}<span class="vblog-2026__category">{{ page.content.category }}</span>{% endif %}
            <span class="vblog-2026__date">{{ page.content.createdAt | localeDate: 'en-US' }}</span>
            {% if page.content.readTime %}<span class="vblog-2026__dot"></span><span class="vblog-2026__readtime">{{ page.content.readTime }}</span>{% endif %}
          </div>

          <h1 class="vblog-2026__title">{{ page.content.title }}</h1>

          {% if page.content.lead %}<p class="vblog-2026__lead">{{ page.content.lead }}</p>{% endif %}

          <div class="vblog-2026__author">
            <span class="vblog-2026__avatar">{{ page.content.initial }}</span>
            <div>
              <div class="vblog-2026__author-name">{{ page.content.author }}</div>
              <div class="vblog-2026__author-role">{{ page.content.authorRole }}</div>
            </div>
          </div>
        </header>

        {% if page.content.image.src %}
        <figure class="vblog-2026__hero">
          <img src="{{ page.content.image.src }}" alt="{{ page.content.image.alt }}">
        </figure>
        {% endif %}

        <div class="vblog-2026__body">
          {% for block in page.content.text %}{{ block.html }}{% else %}<p>Start writing your article…</p>{% endfor %}
        </div>

        {% if page.content.tags %}
        <div class="vblog-2026__tags">
          {% for tag in page.content.tags %}<span class="vblog-2026__tag">#{{ tag }}</span>{% endfor %}
        </div>
        {% endif %}
      </template>

      <!-- Related posts: same category, excluding the current page -->
      <section>
        <h2 class="vblog-2026__related-head">More from Vector</h2>
        <div id="vblog-2026-related" class="vblog-2026__related-grid">
          
            <p class="vblog-2026__empty">No other posts yet.</p>
          
        </div>
        <template data-for="vblog-2026-related" data-query="list('blog-post', { published: true, order: 'published_at:desc', limit: 4 })">
          {% for item in items %}
            {% if item.filePath != page.filePath %}
            <a class="vblog-2026__card" href="{{ item.url }}">
              {% if item.content.image.src %}<img src="{{ item.content.image.src }}" alt="{{ item.content.image.alt }}">{% endif %}
              <div class="vblog-2026__card-body">
                <div class="vblog-2026__card-cat">{{ item.content.category }}</div>
                <h3 class="vblog-2026__card-title">{{ item.content.title }}</h3>
              </div>
            </a>
            {% endif %}
          {% else %}
            <p class="vblog-2026__empty">No other posts yet.</p>
          {% endfor %}
        </template>
      </section>

    </div>
  </article>
  </body>
</html>
