<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog Post — Vector</title>
    <meta name="description" content="Vector blog — insights on AI-native execution, product strategy, and shipping with focus.">
    <style>
      /* ===== Vector blog-post page — namespaced "vblog-2026" ===== */
      :root {
        --vblog-2026-bg: #07080d;
        --vblog-2026-bg-soft: #0c0e16;
        --vblog-2026-bg-elevated: #111421;
        --vblog-2026-surface: rgba(255, 255, 255, 0.045);
        --vblog-2026-line: rgba(255, 255, 255, 0.11);
        --vblog-2026-line-strong: rgba(255, 255, 255, 0.18);
        --vblog-2026-text: #f5f7fb;
        --vblog-2026-text-muted: #a8b0c3;
        --vblog-2026-text-soft: #7f879a;
        --vblog-2026-primary: #8b5cf6;
        --vblog-2026-primary-strong: #a78bfa;
        --vblog-2026-primary-soft: rgba(139, 92, 246, 0.18);
        --vblog-2026-cyan: #22d3ee;
        --vblog-2026-green: #34d399;
        --vblog-2026-white: #ffffff;

        --vblog-2026-font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --vblog-2026-font-mono: "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono", Menlo, monospace;

        --vblog-2026-gradient-hero: radial-gradient(circle at 20% 12%, rgba(139, 92, 246, 0.30), transparent 34%),
          radial-gradient(circle at 82% 10%, rgba(34, 211, 238, 0.20), transparent 30%),
          radial-gradient(circle at 48% 72%, rgba(139, 92, 246, 0.14), transparent 34%);
        --vblog-2026-gradient-primary: linear-gradient(135deg, var(--vblog-2026-primary-strong), var(--vblog-2026-primary) 58%, #6d5dfc);
        --vblog-2026-gradient-border: linear-gradient(135deg, rgba(167, 139, 250, 0.52), rgba(34, 211, 238, 0.22), rgba(255, 255, 255, 0.08));
        --vblog-2026-gradient-card: linear-gradient(180deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.032));

        --vblog-2026-radius-sm: 0.625rem;
        --vblog-2026-radius-md: 0.875rem;
        --vblog-2026-radius-lg: 1.25rem;
        --vblog-2026-radius-xl: 1.75rem;
        --vblog-2026-radius-2xl: 2.25rem;
        --vblog-2026-radius-full: 999rem;

        --vblog-2026-shadow-sm: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.24);
        --vblog-2026-shadow-md: 0 1.25rem 3rem rgba(0, 0, 0, 0.34);
        --vblog-2026-shadow-lg: 0 2rem 5rem rgba(0, 0, 0, 0.48);

        --vblog-2026-container: 48rem;
        --vblog-2026-container-wide: 72rem;
        --vblog-2026-ease: cubic-bezier(0.2, 0.8, 0.2, 1);
        --vblog-2026-ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
      }

      .vblog-2026-root *,
      .vblog-2026-root *::before,
      .vblog-2026-root *::after {
        box-sizing: border-box;
      }

      .vblog-2026-root {
        margin: 0;
        font-family: var(--vblog-2026-font);
        font-size: 1rem;
        line-height: 1.55;
        color: var(--vblog-2026-text);
        background:
          var(--vblog-2026-gradient-hero),
          linear-gradient(180deg, var(--vblog-2026-bg), var(--vblog-2026-bg-soft) 45%, var(--vblog-2026-bg) 100%);
        background-attachment: fixed;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        position: relative;
        min-height: 100vh;
        padding-bottom: 1px;
      }

      .vblog-2026-root::before {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        content: "";
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 0.0625rem, transparent 0.0625rem),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0.0625rem, transparent 0.0625rem);
        background-size: 4rem 4rem;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), transparent 72%);
      }

      .vblog-2026-root>* {
        position: relative;
        z-index: 1;
      }

      .vblog-2026-root img,
      .vblog-2026-root svg {
        display: block;
        max-width: 100%;
      }

      .vblog-2026-root a {
        color: inherit;
        text-decoration: none;
      }

      .vblog-2026-root p {
        margin: 0;
        color: var(--vblog-2026-text-muted);
      }

      .vblog-2026-root ul,
      .vblog-2026-root ol {
        margin: 0;
        padding: 0;
      }

      .vblog-2026-root ::selection {
        color: #fff;
        background: rgba(139, 92, 246, 0.55);
      }

      .vblog-2026-container {
        width: min(calc(100% - 2rem), var(--vblog-2026-container));
        margin-inline: auto;
      }

      .vblog-2026-container-wide {
        width: min(calc(100% - 2rem), var(--vblog-2026-container-wide));
        margin-inline: auto;
      }

      /* ---- Top bar ---- */
      .vblog-2026-topbar {
        position: sticky;
        top: 0;
        z-index: 50;
        height: 4.5rem;
        display: flex;
        align-items: center;
        border-bottom: 0.0625rem solid var(--vblog-2026-line);
        background: rgba(7, 8, 13, 0.78);
        backdrop-filter: blur(1.25rem);
      }

      .vblog-2026-topbar-shell {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
      }

      .vblog-2026-brand {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.875rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .vblog-2026-logo-mark {
        display: grid;
        width: 2rem;
        height: 2rem;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.22), transparent),
          var(--vblog-2026-gradient-primary);
        border: 0.0625rem solid rgba(255, 255, 255, 0.2);
        border-radius: var(--vblog-2026-radius-sm);
        box-shadow: 0 0 2rem rgba(139, 92, 246, 0.35);
      }

      .vblog-2026-logo-mark svg {
        width: 1.05rem;
        height: 1.05rem;
      }

      .vblog-2026-back {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--vblog-2026-text-muted);
        font-size: 0.875rem;
        font-weight: 600;
        padding: 0.5rem 0.875rem;
        border-radius: var(--vblog-2026-radius-full);
        transition: color 160ms var(--vblog-2026-ease), background-color 160ms var(--vblog-2026-ease);
      }

      .vblog-2026-back:hover {
        color: var(--vblog-2026-text);
        background: rgba(255, 255, 255, 0.06);
      }

      .vblog-2026-back svg {
        width: 1rem;
        height: 1rem;
      }

      /* ---- Article header ---- */
      .vblog-2026-article-head {
        padding: 4rem 0 2.5rem;
        text-align: center;
        position: relative;
      }

      .vblog-2026-article-head::before {
        position: absolute;
        top: -4rem;
        left: 50%;
        z-index: -1;
        width: min(50rem, 92vw);
        height: 28rem;
        content: "";
        background: radial-gradient(circle, rgba(139, 92, 246, 0.20), transparent 68%);
        filter: blur(1rem);
        transform: translateX(-50%);
      }

      .vblog-2026-meta-row {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }

      .vblog-2026-category {
        display: inline-flex;
        align-items: center;
        padding: 0.375rem 0.875rem;
        color: var(--vblog-2026-primary-strong);
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        line-height: 1;
        background: rgba(139, 92, 246, 0.1);
        border: 0.0625rem solid rgba(167, 139, 250, 0.24);
        border-radius: var(--vblog-2026-radius-full);
      }

      .vblog-2026-date {
        color: var(--vblog-2026-text-soft);
        font-family: var(--vblog-2026-font-mono);
        font-size: 0.8125rem;
      }

      .vblog-2026-read-time {
        color: var(--vblog-2026-text-soft);
        font-size: 0.8125rem;
        font-weight: 600;
      }

      .vblog-2026-title {
        max-width: 18ch;
        margin: 0 auto;
        color: var(--vblog-2026-text);
        font-size: clamp(2.1rem, 7vw, 3.6rem);
        font-weight: 820;
        line-height: 1.05;
        letter-spacing: -0.05em;
      }

      .vblog-2026-lead {
        max-width: 40rem;
        margin: 1.5rem auto 0;
        font-size: 1.1875rem;
        line-height: 1.65;
        color: var(--vblog-2026-text-muted);
      }

      .vblog-2026-byline {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        margin-top: 2rem;
      }

      .vblog-2026-author-avatar {
        display: grid;
        width: 2.5rem;
        height: 2.5rem;
        place-items: center;
        color: #fff;
        font-size: 0.8125rem;
        font-weight: 850;
        background: linear-gradient(135deg, var(--vblog-2026-primary), var(--vblog-2026-cyan));
        border-radius: var(--vblog-2026-radius-full);
      }

      .vblog-2026-byline-name {
        color: var(--vblog-2026-text);
        font-size: 0.875rem;
        font-weight: 800;
        text-align: left;
      }

      .vblog-2026-byline-role {
        color: var(--vblog-2026-text-soft);
        font-size: 0.75rem;
        text-align: left;
      }

      /* ---- Hero image ---- */
      .vblog-2026-hero-figure {
        position: relative;
        margin: 0 auto 3rem;
        max-width: var(--vblog-2026-container-wide);
        width: min(calc(100% - 2rem), var(--vblog-2026-container-wide));
      }

      .vblog-2026-hero-figure::before {
        position: absolute;
        inset: -0.125rem;
        z-index: -1;
        content: "";
        background: var(--vblog-2026-gradient-border);
        border-radius: calc(var(--vblog-2026-radius-2xl) + 0.125rem);
        opacity: 0.7;
      }

      .vblog-2026-hero-img {
        width: 100%;
        height: clamp(16rem, 42vw, 30rem);
        object-fit: cover;
        border-radius: var(--vblog-2026-radius-2xl);
        border: 0.0625rem solid var(--vblog-2026-line);
        box-shadow: var(--vblog-2026-shadow-lg);
      }

      /* ---- Article body ---- */
      .vblog-2026-body {
        font-size: 1.0625rem;
        line-height: 1.78;
        color: var(--vblog-2026-text-muted);
      }

      .vblog-2026-body>*+* {
        margin-top: 1.5rem;
      }

      .vblog-2026-body h2 {
        margin-top: 3rem;
        color: var(--vblog-2026-text);
        font-size: 1.75rem;
        font-weight: 800;
        line-height: 1.2;
        letter-spacing: -0.04em;
      }

      .vblog-2026-body h3 {
        margin-top: 2.25rem;
        color: var(--vblog-2026-text);
        font-size: 1.3rem;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .vblog-2026-body p {
        color: var(--vblog-2026-text-muted);
      }

      .vblog-2026-body a {
        color: var(--vblog-2026-primary-strong);
        font-weight: 600;
        border-bottom: 0.0625rem solid rgba(167, 139, 250, 0.4);
      }

      .vblog-2026-body a:hover {
        border-bottom-color: var(--vblog-2026-primary-strong);
      }

      .vblog-2026-body ul,
      .vblog-2026-body ol {
        padding-left: 1.5rem;
        display: grid;
        gap: 0.5rem;
      }

      .vblog-2026-body li {
        color: var(--vblog-2026-text-muted);
      }

      .vblog-2026-body ul li {
        list-style: none;
        position: relative;
        padding-left: 0.5rem;
      }

      .vblog-2026-body ul li::before {
        content: "";
        position: absolute;
        left: -0.875rem;
        top: 0.7rem;
        width: 0.4rem;
        height: 0.4rem;
        background: var(--vblog-2026-primary-strong);
        border-radius: var(--vblog-2026-radius-full);
      }

      .vblog-2026-body ol {
        list-style: decimal;
      }

      .vblog-2026-body blockquote {
        margin: 0;
        padding: 1.25rem 1.75rem;
        color: var(--vblog-2026-text);
        font-size: 1.25rem;
        font-weight: 650;
        line-height: 1.5;
        letter-spacing: -0.02em;
        background: var(--vblog-2026-gradient-card);
        border-left: 0.1875rem solid var(--vblog-2026-primary);
        border-radius: var(--vblog-2026-radius-md);
      }

      .vblog-2026-body img {
        width: 100%;
        border-radius: var(--vblog-2026-radius-lg);
        border: 0.0625rem solid var(--vblog-2026-line);
      }

      .vblog-2026-body code {
        font-family: var(--vblog-2026-font-mono);
        font-size: 0.9em;
        padding: 0.15rem 0.4rem;
        background: rgba(255, 255, 255, 0.07);
        border: 0.0625rem solid var(--vblog-2026-line);
        border-radius: 0.4rem;
        color: var(--vblog-2026-cyan);
      }

      .vblog-2026-body pre {
        padding: 1.25rem;
        overflow-x: auto;
        background: rgba(7, 8, 13, 0.6);
        border: 0.0625rem solid var(--vblog-2026-line);
        border-radius: var(--vblog-2026-radius-lg);
      }

      .vblog-2026-body pre code {
        padding: 0;
        background: none;
        border: 0;
        color: var(--vblog-2026-text-muted);
      }

      /* ---- Tags ---- */
      .vblog-2026-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 3rem;
        padding-top: 2rem;
        border-top: 0.0625rem solid var(--vblog-2026-line);
      }

      .vblog-2026-tag {
        display: inline-flex;
        align-items: center;
        padding: 0.375rem 0.875rem;
        color: var(--vblog-2026-text-muted);
        font-size: 0.8125rem;
        font-weight: 700;
        background: var(--vblog-2026-surface);
        border: 0.0625rem solid var(--vblog-2026-line);
        border-radius: var(--vblog-2026-radius-full);
      }

      /* ---- Author card ---- */
      .vblog-2026-author-card {
        display: flex;
        align-items: center;
        gap: 1.25rem;
        margin-top: 2.5rem;
        padding: 1.5rem;
        background: var(--vblog-2026-gradient-card);
        border: 0.0625rem solid var(--vblog-2026-line);
        border-radius: var(--vblog-2026-radius-xl);
        box-shadow: var(--vblog-2026-shadow-sm);
      }

      .vblog-2026-author-card-avatar {
        display: grid;
        flex: 0 0 auto;
        width: 3.5rem;
        height: 3.5rem;
        place-items: center;
        color: #fff;
        font-size: 1rem;
        font-weight: 850;
        background: linear-gradient(135deg, var(--vblog-2026-primary), var(--vblog-2026-cyan));
        border-radius: var(--vblog-2026-radius-full);
      }

      .vblog-2026-author-card-name {
        color: var(--vblog-2026-text);
        font-size: 1rem;
        font-weight: 800;
      }

      .vblog-2026-author-card-bio {
        margin-top: 0.25rem;
        font-size: 0.875rem;
      }

      /* ---- Related posts ---- */
      .vblog-2026-related {
        padding: 4.5rem 0 5rem;
        margin-top: 3.5rem;
        border-top: 0.0625rem solid var(--vblog-2026-line);
      }

      .vblog-2026-related-head {
        margin-bottom: 2.5rem;
      }

      .vblog-2026-related-kicker {
        margin-bottom: 0.75rem;
        color: var(--vblog-2026-primary-strong);
        font-size: 0.75rem;
        font-weight: 850;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .vblog-2026-related-title {
        color: var(--vblog-2026-text);
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        font-weight: 820;
        letter-spacing: -0.04em;
      }

      .vblog-2026-related-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1fr;
      }

      .vblog-2026-related-card {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--vblog-2026-gradient-card);
        border: 0.0625rem solid var(--vblog-2026-line);
        border-radius: var(--vblog-2026-radius-xl);
        box-shadow: var(--vblog-2026-shadow-sm);
        transition: transform 260ms var(--vblog-2026-ease), border-color 260ms var(--vblog-2026-ease);
      }

      .vblog-2026-related-card:hover {
        transform: translateY(-0.25rem);
        border-color: var(--vblog-2026-line-strong);
      }

      .vblog-2026-related-card-img {
        width: 100%;
        height: 11rem;
        object-fit: cover;
        border-bottom: 0.0625rem solid var(--vblog-2026-line);
      }

      .vblog-2026-related-card-body {
        padding: 1.25rem 1.5rem 1.5rem;
      }

      .vblog-2026-related-card-cat {
        color: var(--vblog-2026-primary-strong);
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .vblog-2026-related-card-title {
        margin-top: 0.5rem;
        color: var(--vblog-2026-text);
        font-size: 1.0625rem;
        font-weight: 800;
        line-height: 1.3;
        letter-spacing: -0.03em;
      }

      .vblog-2026-related-card-date {
        margin-top: 0.75rem;
        color: var(--vblog-2026-text-soft);
        font-family: var(--vblog-2026-font-mono);
        font-size: 0.75rem;
      }

      /* ---- Reveal ---- */
      .vblog-2026-reveal {
        opacity: 0;
        transform: translateY(1.25rem);
        transition: opacity 700ms var(--vblog-2026-ease-spring), transform 700ms var(--vblog-2026-ease-spring);
      }

      .vblog-2026-reveal.vblog-2026-is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      @media (min-width: 48rem) {
        .vblog-2026-related-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .vblog-2026-reveal {
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <template data-for="vblog-2026-article" data-query="currentPage()">
        <header class="vblog-2026-article-head">
          <div class="vblog-2026-container">
            <div class="vblog-2026-meta-row vblog-2026-reveal">
              {% if page.content.category %}<span class="vblog-2026-category">{{ page.content.category }}</span>{% endif %}
              {% if page.content.publishedAt %}<span class="vblog-2026-date">{{ page.content.publishedAt | localeDate: 'en-US' }}</span>{% endif %}
              {% if page.content.readTime %}<span class="vblog-2026-read-time">{{ page.content.readTime }}</span>{% endif %}
            </div>
            <h1 class="vblog-2026-title vblog-2026-reveal">{{ page.content.title }}</h1>
            {% if page.content.lead %}<p class="vblog-2026-lead vblog-2026-reveal">{{ page.content.lead }}</p>
            {% endif %}
            <div class="vblog-2026-byline vblog-2026-reveal">
              <span class="vblog-2026-author-avatar" aria-hidden="true">{{ page.content.authorInitials }}</span>
              <div>
                <p class="vblog-2026-byline-name">{{ page.content.author }}</p>
                <p class="vblog-2026-byline-role">{{ page.content.authorRole }}</p>
              </div>
            </div>
          </div>
        </header>

        {% if page.content.heroImage.src %}
        <figure class="vblog-2026-hero-figure vblog-2026-reveal">
          <img class="vblog-2026-hero-img" src="{{ page.content.heroImage.src }}" alt="{{ page.content.heroImage.alt }}">
        </figure>
        {% endif %}

        <div class="vblog-2026-container">
          <div class="vblog-2026-body vblog-2026-reveal">{{ page.content.body }}</div>

          {% if page.content.tags %}
          <div class="vblog-2026-tags">
            {% for tag in page.content.tags %}<span class="vblog-2026-tag">{{ tag }}</span>{% endfor %}
          </div>
          {% endif %}

          {% if page.content.authorBio %}
          <aside class="vblog-2026-author-card">
            <span class="vblog-2026-author-card-avatar" aria-hidden="true">{{ page.content.authorInitials }}</span>
            <div>
              <p class="vblog-2026-author-card-name">{{ page.content.author }}</p>
              <p class="vblog-2026-author-card-bio">{{ page.content.authorBio }}</p>
            </div>
          </aside>
          {% endif %}
        </div>
      </template>
    <article class="vblog-2026-root" id="vblog-2026-top">

      <!-- Top bar -->
      <header class="vblog-2026-topbar">
        <div class="vblog-2026-container-wide vblog-2026-topbar-shell">
          <a class="vblog-2026-brand" href="/" aria-label="Vector home">
            <span class="vblog-2026-logo-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M5 18.2L10.7 5.8c.5-1.1 2.1-1.1 2.6 0L19 18.2c.4.9-.6 1.8-1.4 1.2l-5-3.5a1 1 0 0 0-1.2 0l-5 3.5c-.8.6-1.8-.3-1.4-1.2Z" fill="currentColor"></path>
              </svg>
            </span>
            <span>Vector</span>
          </a>
          <a class="vblog-2026-back" href="/blog">
            <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M12.5 4.5L7 10l5.5 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            All articles
          </a>
        </div>
      </header>
      

      <!-- Article — rendered from this page's own content via Klar currentPage() -->
      <div id="vblog-2026-article">
        <header class="vblog-2026-article-head">
          <div class="vblog-2026-container">
            <div class="vblog-2026-meta-row vblog-2026-reveal">
              
              
              
            </div>
            <h1 class="vblog-2026-title vblog-2026-reveal">Title</h1>
            <p class="vblog-2026-lead vblog-2026-reveal">Lead</p>
            
            <div class="vblog-2026-byline vblog-2026-reveal">
              <span class="vblog-2026-author-avatar" aria-hidden="true"></span>
              <div>
                <p class="vblog-2026-byline-name">fasdfas</p>
                <p class="vblog-2026-byline-role">sadf</p>
              </div>
            </div>
          </div>
        </header>

        

        <div class="vblog-2026-container">
          <div class="vblog-2026-body vblog-2026-reveal">body</div>

          
          <div class="vblog-2026-tags">
            <span class="vblog-2026-tag">Test</span>
          </div>
          

          
          <aside class="vblog-2026-author-card">
            <span class="vblog-2026-author-card-avatar" aria-hidden="true"></span>
            <div>
              <p class="vblog-2026-author-card-name">fasdfas</p>
              <p class="vblog-2026-author-card-bio">asdf</p>
            </div>
          </aside>
          
        </div>
      </div>
      

      <!-- Related posts -->
      <section class="vblog-2026-related">
        <div class="vblog-2026-container-wide">
          <div class="vblog-2026-related-head vblog-2026-reveal">
            <p class="vblog-2026-related-kicker">Keep reading</p>
            <h2 class="vblog-2026-related-title">More from the Vector blog</h2>
          </div>

          <div id="vblog-2026-related-list" class="vblog-2026-related-grid">
            
          </div>
          <template data-for="vblog-2026-related-list" data-query="list('blog-post', { published: true, order: 'published_at:desc', limit: 6 })">
            {% for item in items %}
            {% if item.filePath != page.filePath %}
            <a class="vblog-2026-related-card vblog-2026-reveal" href="{{ item.url }}">
              {% if item.content.heroImage.src %}
              <img class="vblog-2026-related-card-img" src="{{ item.content.heroImage.src }}" alt="{{ item.content.heroImage.alt }}">
              {% endif %}
              <div class="vblog-2026-related-card-body">
                {% if item.content.category %}<span class="vblog-2026-related-card-cat">{{ item.content.category }}</span>{% endif %}
                <h3 class="vblog-2026-related-card-title">{{ item.content.title }}</h3>
                {% if item.content.publishedAt %}<p class="vblog-2026-related-card-date">
                  {{ item.content.publishedAt | localeDate: 'en-US' }}
                </p>{% endif %}
              </div>
            </a>
            {% endif %}
            {% endfor %}
          </template>
        </div>
      </section>

    </article>

    <script>
      (() => {
        "use strict";
        const root = document.querySelector(".vblog-2026-root");
        if (!root) return;
        const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        const reveal = () => {
          const items = Array.from(root.querySelectorAll(".vblog-2026-reveal"));
          if (!items.length) return;
          if (prefersReduced || !("IntersectionObserver" in window)) {
            items.forEach((el) => el.classList.add("vblog-2026-is-visible"));
            return;
          }
          const obs = new IntersectionObserver((entries, o) => {
            entries.forEach((e) => {
              if (!e.isIntersecting) return;
              e.target.classList.add("vblog-2026-is-visible");
              o.unobserve(e.target);
            });
          }, {
            threshold: 0.12,
            rootMargin: "0px 0px -8% 0px"
          });
          items.forEach((el) => obs.observe(el));
        };

        // Run now, and again after Klar renders the template-driven content.
        reveal();
        const mo = new MutationObserver(() => reveal());
        mo.observe(root, {
          childList: true,
          subtree: true
        });
      })();
    </script>
  </body>
</html>
